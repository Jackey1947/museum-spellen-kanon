<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Museum Kanon Maastricht</title>
<link rel="preload" as="image" href="muur_zonder_bres.webp">
<link rel="preload" as="image" href="kanon.webp">
<link rel="preload" as="image" href="aarden_wal.webp">

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
  }

  #scene {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* ACHTERGROND FOTO */
  #muurContainer {
    position: absolute;
    left: 0;
    top: 0;
    width: 60%;
    height: 100%;
  }

  #muurZonder, #muurMet {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #muurMet {
    opacity: 0;
    transition: opacity 0.5s;
  }

  /* RECHTER PANEEL ACHTERGROND */
  #rechterpaneel {
    position: absolute;
    right: 0;
    top: 0;
    width: 40%;
    height: 100%;
    background: linear-gradient(to bottom,
      #3a5a7a 0%,
      #6a8a6a 55%,
      #5a4a2a 100%);
  }

  /* SCHEIDINGSLIJN TUSSEN MUUR EN AARDEN WAL */
  #scheidingslijn {
    position: absolute;
    left: calc(57% - 50px);
    top: 0;
    width: 100px;
    height: 100%;
    background: linear-gradient(to right,
      rgba(0,0,0,0.0)   0%,
      rgba(0,0,0,0.65) 30%,
      rgba(0,0,0,0.95) 48%,
      rgba(0,0,0,0.95) 52%,
      rgba(0,0,0,0.55) 70%,
      rgba(0,0,0,0.0) 100%
    );
    z-index: 4;
    pointer-events: none;
  }

  /* AARDEN WAL */
  #aardenWal {
    position: absolute;
    left: 57%;
    top: 0;
    width: 47%;
    height: 100%;
    object-fit: cover;
    object-position: left center;
    z-index: 2;
  }

  /* KANON FOTO */
  #kanon {
    position: absolute;
    right: 0;
    bottom: 0;
    width: 65%;
    pointer-events: none;
    z-index: 5;
  }

  /* SVG KOGEL */
  #kogel {
    position: absolute;
    width: 20px;
    height: 20px;
    display: none;
    z-index: 6;
  }

  /* EFFECTEN */
  .rook {
    position: absolute;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(210,210,210,0.75), rgba(180,180,180,0.4), transparent);
    border-radius: 50%;
    filter: blur(18px);
    animation: rook 3s forwards;
    z-index: 6;
  }

  @keyframes rook {
    to { opacity: 0; transform: scale(4); }
  }

  .flits {
    position: absolute;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, yellow, orange, transparent);
    border-radius: 50%;
    animation: flash 0.2s forwards;
    z-index: 6;
  }

  @keyframes flash {
    to { opacity: 0; transform: scale(2); }
  }

  .impact {
    position: absolute;
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, rgba(180,180,180,0.8), transparent);
    animation: impact 1.5s forwards;
  }

  @keyframes impact {
    to { opacity: 0; transform: scale(2.5); }
  }

  /* RICHTINGSPIJL */
  #richtPijl {
    position: absolute;
    bottom: 19vh;
    left: 80%;
    transform: translateX(-50%);
    z-index: 10;
    width: 6vw;
    height: auto;
  }

  /* RICHT PANEEL */
  #richtPanel {
    position: absolute;
    bottom: 9vh;
    left: 80%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
  }

  #richtDisplay {
    font-size: 1.1vw;
    font-weight: bold;
    color: white;
    background: rgba(0,0,0,0.55);
    padding: 0.7vh 1vw;
    border-radius: 10px;
    margin-bottom: 0.7vh;
    white-space: nowrap;
  }

  #richtKnoppen {
    display: flex;
    gap: 0.7vw;
    justify-content: center;
  }

  .richtKnop {
    padding: 0.9vh 1.25vw;
    font-size: 1.4vw;
    background: rgba(40,60,120,0.9);
    color: white;
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    z-index: 10;
  }

  /* TOUCH KNOP */
  #knop {
    position: absolute;
    bottom: 3vh;
    left: 80%;
    transform: translateX(-50%);
    padding: 1.5vh 2vw;
    font-size: 1.1vw;
    background: rgba(150,0,0,0.9);
    color: white;
    border-radius: 16px;
    cursor: pointer;
    z-index: 10;
  }

  /* SMV LOGO */
  #smvLogo {
    position: absolute;
    top: 15px;
    left: 15px;
    width: 10vw;
    max-width: 140px;
    min-width: 60px;
    height: auto;
    z-index: 8;
    pointer-events: none;
  }

  /* INFO */
  #info {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 350px;
    background: rgba(255,255,255,0.9);
    padding: 15px;
    border-radius: 10px;
    z-index: 10;
  }

</style>
</head>

<body>

<div id="scene">

  <!-- SMV LOGO -->
  <img id="smvLogo" src="SMV_LOGO_VMM.webp" alt="SMV logo">

  <!-- MUUR -->
  <div id="muurContainer">
    <img id="muurZonder" src="muur_zonder_bres.webp" fetchpriority="high">
    <img id="muurMet">
  </div>

  <!-- RECHTER PANEEL -->
  <div id="rechterpaneel"></div>

  <!-- AARDEN WAL -->
  <img id="aardenWal" src="aarden_wal.webp">

  <!-- SCHEIDINGSLIJN -->
  <div id="scheidingslijn"></div>

  <!-- KANON FOTO -->
  <img id="kanon" src="kanon.webp" fetchpriority="high">

  <!-- KOGEL -->
  <svg id="kogel" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="10" fill="black"/>
  </svg>

  <div id="info">
    <b>Belegering van Maastricht</b><br><br>
    Richt het kanon op de juiste hoek en vuur.<br><br>
    Welke hoek raakt de walmuur?
  </div>

  <!-- Richtingspijl: los gepositioneerd tussen kanon en knoppen -->
  <svg id="richtPijl" width="110" height="90" viewBox="0 -75 110 90">
    <line x1="8" y1="5" x2="98" y2="5" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
    <g id="pijlGroep" transform="translate(92,5) rotate(10)">
      <line x1="0" y1="0" x2="-68" y2="0" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <polygon points="-80,0 -64,-8 -64,8" fill="white"/>
    </g>
  </svg>

  <div id="richtPanel">
    <div id="richtDisplay">Richting: 10°</div>
    <div id="richtKnoppen">
      <div class="richtKnop" id="minderKnop">−</div>
      <div class="richtKnop" id="meerKnop">+</div>
    </div>
  </div>

  <div id="knop">🔥 VUUR</div>

</div>

<!-- geluid -->
<audio id="schot"  src="schot.mp3"  preload="auto"></audio>
<audio id="inslag" src="inslag.mp3" preload="none"></audio>
<audio id="mis"    src="mis.mp3"    preload="none"></audio>

<script>
const knop        = document.getElementById("knop");
const kogel       = document.getElementById("kogel");
const muurMet     = document.getElementById("muurMet");
let muurMetGeladen = false;
function laadMuurMet() {
  if (!muurMetGeladen) { muurMet.src = "muur_met_bres.webp"; muurMetGeladen = true; }
}
const info        = document.getElementById("info");
const geluid      = document.getElementById("schot");
const inslagGeluid = document.getElementById("inslag");
const misGeluid   = document.getElementById("mis");
const richtDisplay = document.getElementById("richtDisplay");
const minderKnop  = document.getElementById("minderKnop");
const meerKnop    = document.getElementById("meerKnop");

// Fractie van de kanonafbeelding waar de monding zich bevindt (aanpasbaar)
const MONDING_FX = 0.54;
const MONDING_FY = 0.42;

// Referentiebreedte waarop de kogelbaan is gekalibreerd
const REFERENTIE_BREEDTE = 1920;

function getMondingPositie() {
  const rect = document.getElementById("kanon").getBoundingClientRect();
  return {
    x: rect.left + rect.width  * MONDING_FX,
    y: rect.top  + rect.height * MONDING_FY
  };
}

const stappenHoeken = [10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
const raakStap = 4; // 30° is de juiste hoek
let huidigStap = 9;

const beginTekst = info.innerHTML;

const pijlGroep = document.getElementById("pijlGroep");

function updateRichting() {
  const hoek = stappenHoeken[huidigStap];
  richtDisplay.textContent = "Richting: " + hoek + "°";
  pijlGroep.setAttribute("transform", "translate(92,5) rotate(" + hoek + ")");
}

knop.onclick = vuur;

minderKnop.onclick = function() {
  if (huidigStap > 0) { huidigStap--; updateRichting(); }
};

meerKnop.onclick = function() {
  if (huidigStap < stappenHoeken.length - 1) { huidigStap++; updateRichting(); }
};

updateRichting();

function reset() {
  muurMet.style.opacity = 0;
  kogel.style.display = "none";
  info.innerHTML = beginTekst;
  huidigStap = 9;
  updateRichting();
}

function vuur() {

  laadMuurMet();

  // Reset toestand
  muurMet.style.opacity = 0;
  kogel.style.display = "none";

  const raak = (huidigStap === raakStap);

  const monding = getMondingPositie();
  let x = monding.x;
  let y = monding.y;

  const schaal  = window.innerWidth / REFERENTIE_BREEDTE;
  const hoekRad = stappenHoeken[huidigStap] * Math.PI / 180;
  let vx = -20 * Math.cos(hoekRad) * schaal;
  let vy = -20 * Math.sin(hoekRad) * schaal;
  let g  = 0.3 * schaal;
  let scale = 1;

  kogel.style.display = "block";

  geluid.currentTime = 0;
  geluid.play();

  effect("flits", monding.x, monding.y);
  effect("rook",  monding.x, monding.y);
  effect("rook",  monding.x, monding.y);
  effect("rook",  monding.x, monding.y);
  effect("rook",  monding.x, monding.y);
  effect("rook",  monding.x, monding.y);

  info.innerHTML = "<b>Schot gelost…</b>";

  function animatie() {

    vy += g;
    x += vx;
    y += vy;

    scale += 0.003;

    kogel.style.left = x + "px";
    kogel.style.top = y + "px";
    kogel.style.transform = "scale(" + scale + ")";

    // MIS
    if (!raak && (y > window.innerHeight - 30 || x < -50)) {
      kogel.style.display = "none";
      misGeluid.currentTime = 0;
      misGeluid.play();
      info.innerHTML = "<b>MIS</b><br>De kogel raakt de walmuur niet.";
      return;
    }

    // RAAK – kogel bereikt bijna de linkerkant van de muur
    if (raak && x < 50) {

      kogel.style.display = "none";

      inslagGeluid.currentTime = 0;
      inslagGeluid.play();

      spatten(x + 10, y);

      muurMet.style.opacity = 1;

      effect("impact", 60, y);

      info.innerHTML =
        "<b>RAAK!</b><br>" +
        "Er ontstaat een bres in de walmuur.<br><br>" +
        "Zo konden vijandige legers meerdere bressen in de walmuur schieten en de stad binnendringen.";

      setTimeout(reset, 6000);

      return;
    }

    requestAnimationFrame(animatie);
  }

  animatie();
}

function effect(type, x, y) {
  let el = document.createElement("div");
  el.className = type;
  el.style.left = x + "px";
  el.style.top = y + "px";
  document.getElementById("scene").appendChild(el);
}

function spatten(cx, cy) {
  const scene = document.getElementById("scene");

  // Steengruis – veel kleine lichte deeltjes
  for (let i = 0; i < 55; i++) {
    const hoek = Math.random() * Math.PI * 2;
    const snelheid = 6 + Math.random() * 22;
    let dvx = Math.cos(hoek) * snelheid;
    let dvy = Math.sin(hoek) * snelheid - 4;
    const maat = 2 + Math.random() * 5;
    const grijstint = Math.floor(160 + Math.random() * 80);
    const kleur = "rgb(" + grijstint + "," + (grijstint - 20) + "," + (grijstint - 30) + ")";

    const el = document.createElement("div");
    el.style.cssText =
      "position:absolute;" +
      "width:" + maat + "px;" +
      "height:" + maat + "px;" +
      "background:" + kleur + ";" +
      "border-radius:50%;" +
      "left:" + cx + "px;" +
      "top:" + cy + "px;" +
      "z-index:7;" +
      "pointer-events:none;";
    scene.appendChild(el);

    let px = cx, py = cy, opacity = 1;

    (function animeerGruis() {
      dvy += 0.5;
      px  += dvx;
      py  += dvy;
      opacity -= 0.03;

      el.style.left    = px + "px";
      el.style.top     = py + "px";
      el.style.opacity = opacity;

      if (opacity > 0) {
        requestAnimationFrame(animeerGruis);
      } else {
        el.remove();
      }
    })();
  }

  // Grote fragmenten
  const aantalDeeltjes = 18;

  for (let i = 0; i < aantalDeeltjes; i++) {
    const hoek = (i / aantalDeeltjes) * Math.PI * 2 + Math.random() * 0.4;
    const snelheid = 18 + Math.random() * 28;
    let dvx = Math.cos(hoek) * snelheid;
    let dvy = Math.sin(hoek) * snelheid - 6;
    const breedte = 8  + Math.random() * 24;
    const hoogte  = 8  + Math.random() * 24;
    const kleur = Math.random() < 0.6 ? "#1a1a1a" : "#4a3520";

    const el = document.createElement("div");
    el.style.cssText =
      "position:absolute;" +
      "width:" + breedte + "px;" +
      "height:" + hoogte + "px;" +
      "background:" + kleur + ";" +
      "border-radius:2px;" +
      "left:" + cx + "px;" +
      "top:" + cy + "px;" +
      "z-index:7;" +
      "pointer-events:none;";
    scene.appendChild(el);

    let px = cx, py = cy, opacity = 1;
    let hoekRot = Math.random() * 360;
    const rotSnelheid = (Math.random() - 0.5) * 24;

    (function animeerDeeltje() {
      dvy     += 0.35;
      px      += dvx;
      py      += dvy;
      opacity -= 0.022;
      hoekRot += rotSnelheid;

      el.style.left      = px + "px";
      el.style.top       = py + "px";
      el.style.opacity   = opacity;
      el.style.transform = "rotate(" + hoekRot + "deg)";

      if (opacity > 0) {
        requestAnimationFrame(animeerDeeltje);
      } else {
        el.remove();
      }
    })();
  }
}
</script>

</body>
</html>
